name: APS checks

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install the offline test environment
        run: >-
          python -m pip install
          -c requirements/constraints-py312.txt
          -e ".[server,pipeline,ml,dev]"
      - name: Run offline unit tests
        run: python -m pytest
      - name: Lint architecture foundation changes
        run: >-
          python -m ruff check
          src/aps/cli.py
          src/aps/config.py
          src/aps/db
          src/aps/pipelines
          src/aps/superset/superset_api.py
          tests/test_architecture_boundaries.py
          tests/test_cli.py
          tests/test_config.py
          tests/test_db_migrations.py
          tests/test_model_registry.py
          tests/test_nightly_pipeline.py
          tests/test_provenance.py
          tests/test_server_factory.py
          tests/test_superset_api_client.py

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: aps_ci
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aps_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      APS_TEST_POSTGRES_DSN: postgresql://postgres:postgres@127.0.0.1:5432/aps_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install database integration dependencies
        run: >-
          python -m pip install
          -c requirements/constraints-py312.txt
          -e ".[dev]"
      - name: Run disposable PostgreSQL lifecycle tests
        run: python -m pytest -o addopts= -m integration
